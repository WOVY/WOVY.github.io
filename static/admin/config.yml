backend:
  name: github
  repo: WOVY/WOVY.github.io
  branch: main
  base_url: https://oauth-proxy-jx1s.onrender.com
  auth_endpoint: auth

media_folder: static/images
public_folder: /images

collections:
  - name: posts
    label: Posts
    folder: content/posts
    create: true
    slug: "{{slug}}"
    extension: md
    format: toml-frontmatter
    fields:
      - { label: "제목", name: "title", widget: "string" }
      - { label: "날짜", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss.SSSZ", date_format: "YYYY-MM-DD", time_format: "HH:mm" }
      - { label: "초안", name: "draft", widget: "boolean", default: false }
      - { label: "요약", name: "summary", widget: "string", required: false }
      - { label: "태그", name: "tags", widget: "list", required: false, default: [] }
      - { label: "시리즈", name: "series", widget: "list", required: false, default: [] }
      - label: "커버 이미지"
        name: "cover"
        widget: "object"
        required: false
        fields:
          - { label: "이미지", name: "image", widget: "image", required: false }
          - { label: "설명", name: "alt", widget: "string", required: false }
      - { label: "본문", name: "body", widget: "markdown" }

  - name: pages
    label: Pages
    files:
      - name: about
        label: About
        file: content/about.md
        format: toml-frontmatter
        fields:
          - { label: "제목", name: "title", widget: "string" }
          - { label: "날짜", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss.SSSZ", date_format: "YYYY-MM-DD", time_format: "HH:mm" }
          - { label: "초안", name: "draft", widget: "boolean", default: false }
          - { label: "본문", name: "body", widget: "markdown" }
