baseURL = "https://WOVY.github.io/"
languageCode = "ko-kr"
title = "WOVY's Dev Blog"
theme = "PaperMod"
paginate = 10
enableRobotsTXT = true
googleAnalytics = "G-381JTKX1TD"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  tag = "tags"
  series = "series"

[params]
  author = "WOVY"
  description = "AI · 복지 · 개발 기록"
  defaultTheme = "auto"
  disableThemeToggle = false

  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  ShowToc = true
  TocOpen = false
  comments = true
  DateFormat = "2006-01-02"

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 2
    keys = ["title", "permalink", "summary", "content"]

  [params.profileMode]
    enabled = true
    title = "WOVY"
    subtitle = "AI · 복지 · 개발 기록"
    imageUrl = "https://github.com/WOVY.png"
    imageWidth = 120
    imageHeight = 120
    imageTitle = "WOVY"

    [[params.profileMode.buttons]]
      name = "Posts"
      url = "/posts/"
    [[params.profileMode.buttons]]
      name = "Search"
      url = "/search/"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/WOVY"

  [params.giscus]
    repo = "WOVY/WOVY.github.io"
    repoId = "R_kgDOSGjdIw"
    category = "General"
    categoryId = "DIC_kwDOSGjdI84C7L4T"
    mapping = "pathname"
    strict = "0"
    reactionsEnabled = "1"
    emitMetadata = "0"
    inputPosition = "bottom"
    theme = "preferred_color_scheme"
    lang = "ko"

  [params.assets]
    disableHLJS = true
    favicon = "https://github.com/WOVY.png"
    favicon16x16 = "https://github.com/WOVY.png"
    favicon32x32 = "https://github.com/WOVY.png"
    apple_touch_icon = "https://github.com/WOVY.png"

[markup]
  [markup.highlight]
    style = "dracula"
    lineNos = true
    lineNumbersInTable = true

[menu]
  [[menu.main]]
    name = "Posts"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    name = "Series"
    url = "/series/"
    weight = 2
  [[menu.main]]
    name = "Tags"
    url = "/tags/"
    weight = 3
  [[menu.main]]
    name = "Search"
    url = "/search/"
    weight = 4
  [[menu.main]]
    name = "GitHub"
    url = "https://github.com/WOVY"
    weight = 5
